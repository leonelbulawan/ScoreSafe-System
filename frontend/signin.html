<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreSafe | Sign in</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <main class="container">
    <div class="auth-container signin">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-large">ScoreSafe</div>
          <p>Welcome back — sign in to continue to your dashboard</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email"><i class="fas fa-envelope icon-label"></i> Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group" style="position:relative">
            <label for="password"><i class="fas fa-lock icon-label"></i> Password</label>
            <input type="password" id="password" name="password" required>
          </div>

          <div style="margin-top:6px;margin-bottom:8px"><span id="loginMsg"></span></div>

          <button type="submit" class="btn-primary"><i class="fas fa-sign-in-alt icon-label"></i> Sign In</button>
        </form>

        <div class="form-footer">
          <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
