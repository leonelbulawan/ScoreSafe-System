<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreSafe | Sign up</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <main class="container">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-large">Sign Up</div>
          <p>Sign up as a teacher or student to start using ScoreSafe</p>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label for="name"><i class="fas fa-user icon-label"></i> Full name</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="email"><i class="fas fa-envelope icon-label"></i> Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group" style="position:relative">
            <label for="password"><i class="fas fa-lock icon-label"></i> Password</label>
            <input type="password" id="password" name="password" required>
          </div>

          <div class="form-group" style="position:relative">
            <label for="confirmPassword"><i class="fas fa-lock icon-label"></i> Confirm password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
          </div>

          <div class="form-group">
            <label for="role"><i class="fas fa-user-tag icon-label"></i> Role</label>
            <select id="role" name="role">
              <option value="teacher">Teacher</option>
              <option value="student">Student</option>
            </select>
          </div>

          <div style="margin-top:6px;margin-bottom:8px"><span id="registerMsg"></span></div>

          <button type="submit" class="btn-primary"><i class="fas fa-user-plus"></i> Sign Up</button>
        </form>

        <div class="form-footer">
          <p>Already have an account? <a href="signin.html">Sign in</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
