<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ScoreSafe | Profile</title>
	<link rel="stylesheet" href="../css/main.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="topbar">
	<div class="container nav-wrapper">
		<div class="logo">ScoreSafe</div>
		<div class="hamburger" id="hamburger">&#9776;</div>
		<nav>
			<a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
			<a href="record.html"><i class="fas fa-chart-line"></i> Record</a>
			<a class="active" href="profile.html"><i class="fas fa-user"></i> Profile</a>
			<a href="#" class="mobile-only logout-btn"><i class="fas fa-sign-out-alt"></i> Sign out</a>
		</nav>
		<div class="header-actions">
			<a href="#" class="btn outline logout-btn" title="Sign out"><i class="fas fa-sign-out-alt"></i> <span class="logout-label">Sign out</span></a>
		</div>
	</div>
</header>

<main class="container">

	<section class="card">
		<div class="profile-card">
			<div class="profile-avatar">
				<div class="avatar-wrapper" id="studentAvatarPreview">
					<!-- image inserted by JS -->
				</div>
			</div>

			<div class="profile-info">

				<form id="studentProfileForm">
					<div class="form-group">
						<label for="studentFullName"><i class="fas fa-user icon-label"></i> Full name</label>
							<input id="studentFullName" type="text" />
					</div>

					<div class="form-group">
						<label for="studentEmail"><i class="fas fa-envelope icon-label"></i> Email</label>
						<input id="studentEmail" type="email" />
					</div>

					<div class="form-group">
						<label for="studentBio"><i class="fas fa-briefcase icon-label"></i>Bio</label>
						<input id="studentBio" type="text" />
					</div>

					<div class="form-group">
						<label for="studentAvatar"><i class="fas fa-image icon-label"></i> Profile photo</label>
						<input id="studentAvatar" type="file" accept="image/*" />
					</div>

					<div style="display:flex;gap:12px;margin-top:8px">
						<div class="profile-actions">
							<button class="btn" id="saveStudentProfile"><i class="fas fa-save icon-label"></i> Save</button>
							<button type="button" class="btn outline" id="resetStudentProfile"><i class="fas fa-rotate-left icon-label"></i> Reset</button>
						</div>
					</div>
				</form>
			</div>
		</div>
	</section>

</main>

<footer class="site-footer">
	<div class="container footer-container">
		<p>&copy; 2026 ScoreSafe. All rights reserved.</p>
	</div>
</footer>

<script src="../js/student.js"></script>
</body>
</html>
