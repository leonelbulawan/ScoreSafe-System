<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ScoreSafe | Profile</title>
	<link rel="stylesheet" href="../css/main.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="topbar">
	<div class="container nav-wrapper">
		<div class="logo">ScoreSafe</div>
		<div class="hamburger" id="hamburger">&#9776;</div>
		<nav>
			<a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
			<a href="record.html"><i class="fas fa-chart-line"></i> Record</a>
			<a class="active" href="profile.html"><i class="fas fa-user"></i> Profile</a>
			<a href="#" class="mobile-only logout-btn"><i class="fas fa-sign-out-alt"></i> Sign out</a>
		</nav>
		<div class="header-actions">
			<a href="#" class="btn outline logout-btn" title="Sign out"><i class="fas fa-sign-out-alt"></i> <span class="logout-label">Sign out</span></a>
		</div>
	</div>
</header>

<main class="container">

	<section class="card">
		<div style="display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap">
			<div style="flex:0 0 240px;">
				<div style="text-align:center">
					<div id="studentAvatarPreview" style="width:180px;height:180px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;margin:auto;font-size:40px;color:#6b7280;overflow:hidden;border:2px solid var(--primary-color)"></div>
				</div>
			</div>

			<div style="flex:1;min-width:320px">

				<form id="studentProfileForm">
					<div class="form-group">
						<label for="studentFullName">Full name</label>
						<input id="studentFullName" type="text"/>
					</div>

					<div class="form-group">
						<label for="studentEmail">Email</label>
						<input id="studentEmail" type="email"/>
					</div>



					<div class="form-group">
						<label for="studentBio">Bio</label>
						<input id="studentBio" type="text"/>
					</div>

					<div class="form-group">
						<label for="studentAvatar">Profile photo</label>
						<input id="studentAvatar" type="file" accept="image/*" />
					</div>

					<div style="display:flex;gap:12px;margin-top:8px">
						<button class="btn" id="saveStudentProfile"><i class="fas fa-save" style="margin-right:8px"></i>Save</button>
						<button type="button" class="btn outline" id="resetStudentProfile"><i class="fas fa-rotate-left" style="margin-right:8px"></i>Reset</button>
					</div>
					<p id="studentProfileMsg" style="margin-top:12px;color:#0f766e;font-weight:600;display:none"></p>
				</form>
			</div>
		</div>
	</section>

</main>

<footer class="site-footer">
	<div class="container footer-container">
		<p>&copy; 2026 ScoreSafe. All rights reserved.</p>
	</div>
</footer>

<script src="../js/student.js"></script>
</body>
</html>
