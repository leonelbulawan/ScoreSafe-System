<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScoreSafe | Profile</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="topbar">
  <div class="container nav-wrapper">
    <div class="logo">ScoreSafe</div>
    <div class="hamburger" id="hamburger">&#9776;</div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="student.html"><i class="fas fa-user-graduate"></i> Student</a>
      <a href="subject.html"><i class="fas fa-book"></i> Subject</a>
      <a href="record-score.html"><i class="fas fa-plus-circle"></i> Record</a>
      <a class="active" href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <a href="#" class="mobile-only logout-btn"><i class="fas fa-sign-out-alt"></i> Sign out</a>
    </nav>
    <div class="header-actions">
      <a href="#" class="btn outline logout-btn"><i class="fas fa-sign-out-alt"></i> <span class="logout-label">Sign out</span></a>
    </div>
  </div>
</header>

<main class="container">
  <section class="card">
    <div style="display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap">
      <div style="flex:0 0 240px;">
        <div style="text-align:center">
          <div id="teacherAvatarPreview" style="width:180px;height:180px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;margin:auto;font-size:40px;color:#6b7280;overflow:hidden;border:2px solid var(--primary-color)"></div>
        </div>
      </div>

      <div style="flex:1;min-width:320px">
        

        <form id="teacherProfileForm">
          <div class="form-group">
            <label for="teacherFullName">Full name</label>
            <input id="teacherFullName" type="text"/>
          </div>

          <div class="form-group">
            <label for="teacherEmail">Email</label>
            <input id="teacherEmail" type="email"/>
          </div>

          

          <div class="form-group">
            <label for="teacherBio">Professional summary</label>
            <input id="teacherBio" type="text"/>
          </div>

          <div class="form-group">
            <label for="teacherAvatar">Profile photo</label>
            <input id="teacherAvatar" type="file" accept="image/*" />
          </div>

          <div style="display:flex;gap:12px;margin-top:8px">
            <button class="btn" id="saveTeacherProfile"><i class="fas fa-save" style="margin-right:8px"></i>Save</button>
            <button type="button" class="btn outline" id="resetTeacherProfile"><i class="fas fa-rotate-left" style="margin-right:8px"></i>Reset</button>
          </div>
          <p id="teacherProfileMsg" style="margin-top:12px;color:#0f766e;font-weight:600;display:none"></p>
        </form>
      </div>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="container footer-container">
    <p>&copy; 2026 ScoreSafe. All rights reserved.</p>
  </div>
</footer>

<script src="../js/teacher.js"></script>
</body>
</html>
