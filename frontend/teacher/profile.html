<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScoreSafe | Profile</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="topbar">
  <div class="container nav-wrapper">
    <div class="logo">ScoreSafe</div>
    <div class="hamburger" id="hamburger">&#9776;</div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="student.html"><i class="fas fa-user-graduate"></i> Student</a>
      <a href="subject.html"><i class="fas fa-book"></i> Subject</a>
      <a href="record-score.html"><i class="fas fa-plus-circle"></i> Record</a>
      <a class="active" href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <a href="#" class="mobile-only logout-btn"><i class="fas fa-sign-out-alt"></i> Sign out</a>
    </nav>
    <div class="header-actions">
      <a href="#" class="btn outline logout-btn"><i class="fas fa-sign-out-alt"></i> <span class="logout-label">Sign out</span></a>
    </div>
  </div>
</header>

<main class="container">
  <section class="card">
    <div class="profile-card">
      <div class="profile-avatar">
        <div class="avatar-wrapper" id="teacherAvatarPreview">
          <!-- image inserted by JS -->
        </div>
      </div>

      <div class="profile-info">
        <form id="teacherProfileForm">
          <div class="form-group">
            <label for="teacherFullName"><i class="fas fa-user icon-label"></i> Full name</label>
            <input id="teacherFullName" type="text" />
          </div>

          <div class="form-group">
            <label for="teacherEmail"><i class="fas fa-envelope icon-label"></i> Email</label>
            <input id="teacherEmail" type="email" />
          </div>

          <div class="form-group">
            <label for="teacherBio"><i class="fas fa-briefcase icon-label"></i>Bio</label>
            <input id="teacherBio" type="text" />
          </div>

          <div class="form-group">
            <label for="teacherAvatar"><i class="fas fa-image icon-label"></i> Profile photo</label>
            <input id="teacherAvatar" type="file" accept="image/*" />
          </div>

          <div class="profile-actions">
            <button class="btn" id="saveTeacherProfile"><i class="fas fa-save icon-label"></i> Save</button>
            <button type="button" class="btn outline" id="resetTeacherProfile"><i class="fas fa-rotate-left icon-label"></i> Reset</button>
          </div>
        </form>
      </div>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="container footer-container">
    <p>&copy; 2026 ScoreSafe. All rights reserved.</p>
  </div>
</footer>

<script src="../js/teacher.js"></script>
</body>
</html>
