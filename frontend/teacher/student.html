<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ScoreSafe | Student</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="topbar">
  <div class="container nav-wrapper">
    <div class="logo">ScoreSafe</div>
    <div class="hamburger" id="hamburger">&#9776;</div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a class="active" href="student.html"><i class="fas fa-user-graduate"></i> Student</a>
      <a href="subject.html"><i class="fas fa-book"></i> Subject</a>
      <a href="record-score.html"><i class="fas fa-plus-circle"></i> Record</a>
      <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <a href="#" class="mobile-only logout-btn"><i class="fas fa-sign-out-alt"></i> Sign out</a>
    </nav>
    <div class="header-actions">
      <a href="#" class="btn outline logout-btn"><i class="fas fa-sign-out-alt"></i> <span class="logout-label">Sign out</span></a>
    </div>
    </nav>
  </div>
</header>

<main class="container">

  <section class="card">
    <form id="addStudentForm">
      <div class="form-group">
        <label for="studentEmail"><i class="fas fa-envelope icon-label"></i> Email</label>
        <input type="email" id="studentEmail" required>
      </div>
      <div class="form-group">
        <label for="studentName"><i class="fas fa-user icon-label"></i> Full Name</label>
        <input type="text" id="studentName" required>
      </div>
      <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Add Student</button>
    </form>
    <p id="studentMsg"></p>
  </section>

  <section class="card table-section">
    <div class="table-header">
      <h3>Added Students</h3>
      <div class="search-container">
        <input type="text" id="searchInput" class="table-search" data-table="#studentsTable">
        <button type="button" class="search-btn" aria-label="Search"><i class="fas fa-search search-icon"></i></button>
      </div>
    </div>
    <div class="table-wrapper">
      <table id="studentsTable">
        <thead>
          <tr>
            <th>Email</th>
            <th>Full Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr class="empty-row"><td colspan="4">No students yet</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-container">
    <p>&copy; 2026 ScoreSafe. All rights reserved.</p>
  </div>
</footer>

<script src="../js/teacher.js"></script>
</body>
</html>
