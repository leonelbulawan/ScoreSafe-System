<header class="topbar">
  <div class="container nav-wrapper">
    <div class="logo">ScoreSafe</div>
    <div class="hamburger" id="hamburger">&#9776;</div>
    <nav>
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="student.html"><i class="fas fa-user-graduate"></i> Student</a>
      <a href="subject.html"><i class="fas fa-book"></i> Subject</a>
      <a href="record-score.html"><i class="fas fa-plus-circle"></i> Record Score</a>
      <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <a class="active" href="upload-paper.html"><i class="fas fa-upload"></i> Upload Paper</a>
      <a href="#" class="mobile-only logout-btn"><i class="fas fa-sign-out-alt"></i> Sign out</a>
    </nav>
    <div class="header-actions">
      <a href="#" class="btn outline logout-btn"><i class="fas fa-sign-out-alt"></i> <span class="logout-label">Sign out</span></a>
    </div>
  </div>
</header>

<main class="container">

  <section class="card">
    <form id="uploadPaperForm" enctype="multipart/form-data">
      <div class="form-group">
        <label for="studentSelectUpload">Student Email</label>
        <select id="studentSelectUpload" required>
          <option value="">-- Select Student --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="subjectSelectUpload">Subject</label>
        <select id="subjectSelectUpload" required>
          <option value="">-- Select Subject --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="categorySelectUpload">Category</label>
        <select id="categorySelectUpload" required>
          <option value="">-- Select Category --</option>
          <option value="Performance">Performance</option>
          <option value="Activity">Activity</option>
          <option value="Quiz">Quiz</option>
          <option value="Recitation">Recitation</option>
          <option value="Examination">Examination</option>
        </select>
      </div>

      <div class="form-group">
        <label for="paperFile">Upload Paper</label>
        <input type="file" id="paperFile" accept=".jpg,.jpeg,.png,.gif,.doc,.docx,.pdf,.ppt,.pptx">
      </div>

      <button type="submit" class="btn"><i class="fas fa-cloud-upload-alt"></i> Upload Paper</button>
    </form>
    <p id="uploadMsg"></p>
  </section>

  <section class="card table-section">
    <div class="table-wrapper">
      <table id="scoresTable">
        <thead>
          <tr>
            <th>Student Email</th>
            <th>Subject</th>
            <th>Score</th>
            <th>Paper</th>
            <th>Category</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr class="empty-row"><td colspan="7">No records yet</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-container">
    <p>&copy; 2026 ScoreSafe. All rights reserved.</p>
  </div>
</footer>

<script src="../js/teacher.js"></script>
</body>
</html>
